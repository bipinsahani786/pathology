version: '3.8'

services:
  # 1. PHP Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pathology-app
    container_name: pathology_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - pathology-network

  # 2. Nginx Web Server Container
  web:
    image: nginx:alpine
    container_name: pathology_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pathology-network

  # 3. PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: pathology_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pathology_saas}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - pathology-network
# 4. Adminer Web Database Manager
  adminer:
    image: adminer
    container_name: pathology_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - pathology-network
networks:
  pathology-network:
    driver: bridge

volumes:
  db-data: